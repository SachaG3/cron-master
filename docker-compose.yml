services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cronmaster
      POSTGRES_USER: cronmaster
      POSTGRES_PASSWORD: cronmaster
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cronmaster -d cronmaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      PORT: 4000
      DATABASE_URL: postgres://cronmaster:cronmaster@postgres:5432/cronmaster
      DEFAULT_NTFY_SERVER: https://ntfy.sh
      CRON_MASTER_API_KEY: change-me-dev-key
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://api:4000
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  postgres-data:
