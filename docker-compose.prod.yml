services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cronmaster}
      POSTGRES_USER: ${POSTGRES_USER:-cronmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cronmaster} -d ${POSTGRES_DB:-cronmaster}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-cronmaster}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cronmaster}
      DEFAULT_NTFY_SERVER: ${DEFAULT_NTFY_SERVER:-https://ntfy.sh}
      CRON_MASTER_API_KEY: ${CRON_MASTER_API_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      CREDENTIALS_SECRET: ${CREDENTIALS_SECRET:?CREDENTIALS_SECRET is required}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CRON_MASTER_BLOCK_PRIVATE_TARGETS: ${CRON_MASTER_BLOCK_PRIVATE_TARGETS:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    environment:
      API_URL: http://api:4000
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
